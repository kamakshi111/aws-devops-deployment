name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd ~/aws-devops-deployment

            git pull origin main

            sudo docker stop flask-api || true
            sudo docker rm flask-api || true

            sudo docker build -t aws-devops-api .

            sudo docker run -d \
              --name flask-api \
              --restart always \
              -p 5000:5000 \
              aws-devops-api

            sudo systemctl restart nginx
